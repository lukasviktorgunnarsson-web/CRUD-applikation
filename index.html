<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD-application</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Movies and Series</h1>

    <div id="addInputs">
        <input id="inputMovieTitle" type="text" placeholder="Movie Title">
        <input id="inputCategory" type="text" placeholder="Category">
        <input id="inputPremier" type="text" placeholder="Premier">
        
        <select id="selectMedia" name="media">
            <option value="Movie">Movie</option>
            <option value="Serie">Serie</option>
        </select>

        <input id="inputMainCha" type="text" placeholder="Main Character">
        <button id="saveMovieBtn">Add</button>
    </div>
    

    <div id="searchInputs">
        <input type="text" placeholder="Movie Title">
        <input type="text" placeholder="Category">
        <input type="text" placeholder="Premier">
        
        <select id="searchOption" name="media">
            <option value="all">All</option>
            <option value="Movie">Movie</option>
            <option value="Serie">Serie</option>
        </select>
        <input type="text" placeholder="Main Character">
        <button id="searchBtn">Search</button>
    </div>

    <div>
        <button id="listAllBtn">Show all</button>
        <button id="removeAllBtn">Clear</button>

    </div>
    <ul id="movieList"> </ul>
</body>

</html>
